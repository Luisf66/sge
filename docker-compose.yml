services:

    sge_web:
      build: .
      restart: always
      ports:
        - 8000:8000
      depends_on:
        - sge_db
      env_file:
        - .env
      
    sge_db:
      image: postgres:15
      ports:
        - 15432:5432
      volumes:
        - sge_postgres_data:/var/lib/postgresql/data/
      environment:
        - POSTGRES_USER=postgres
        - POSTGRES_PASSWORD=postgres
        - POSTGRES_DB=sge

volumes:
  sge_postgres_data: