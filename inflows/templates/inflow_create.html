{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">
    <h3 class="display-6">
        Resgistrar Entrada de Produtos
    </h3>

    <div class="card">
        <div class="card-body">
            <form method="POST" class="form">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">
                    Salvar Entrada
                </button>
            </form>
        </div>
    </div>

    <a href="{% url 'inflow_list' %}" class="btn btn-secondary mt-3">
        Cancelar
    </a>
</div>

{% endblock %}
